mutation RailwayDomainUpdate($input: RailwayDomainUpdateInput!) {
  railwayDomainUpdate(input: $input) {
    ...RailwayDomainFields
  }
}

fragment RailwayDomainFields on RailwayDomain {
  id
  domain
  status
  autoRenewEnabled
  purchasePrice
  renewalPrice
  registrationYears
  nextBillingDate
  workspaceId
  workspaceName
  createdAt
  nameservers {
    nameservers
    isDefault
  }
  connectedServiceInstances {
    projectId
    serviceId
    environmentId
    serviceName
  }
}
