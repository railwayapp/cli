mutation CustomDomainCreate($input: CustomDomainCreateInput!) {
  customDomainCreate(input: $input) {
    id
    domain
    createdAt
    updatedAt
    serviceId
    environmentId
    projectId
    targetPort
    syncStatus
    status {
      dnsRecords {
        hostlabel
        fqdn
        recordType
        requiredValue
        currentValue
        status
        zone
        purpose
      }
      cdnProvider
      certificates {
        issuedAt
        expiresAt
        domainNames
        fingerprintSha256
        keyType
      }
      certificateStatus
      certificateStatusDetailed
      certificateErrorMessage
      certificateErrorType
      certificateRetryable
      verificationToken
      verificationDnsHost
      verified
    }
  }
}
