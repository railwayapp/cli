query Domains(
  $environmentId: String!
  $projectId: String!
  $serviceId: String!
) {
  domains(
    environmentId: $environmentId
    projectId: $projectId
    serviceId: $serviceId
  ) {
    serviceDomains {
      id
      domain
      suffix
      environmentId
      serviceId
      targetPort
      syncStatus
      createdAt
      updatedAt
    }
    customDomains {
      id
      domain
      environmentId
      projectId
      serviceId
      targetPort
      syncStatus
      createdAt
      updatedAt
      status {
        dnsRecords {
          hostlabel
          fqdn
          recordType
          requiredValue
          currentValue
          status
          zone
          purpose
        }
        cdnProvider
        certificateStatus
        certificateStatusDetailed
        certificateErrorMessage
        certificateErrorType
        certificateRetryable
        certificates {
          issuedAt
          expiresAt
          domainNames
          fingerprintSha256
          keyType
        }
        verificationToken
        verificationDnsHost
        verified
      }
    }
  }
}
