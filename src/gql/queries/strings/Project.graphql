query Project($id: String!) {
  project(id: $id) {
    id
    name
    deletedAt
    workspace {
      name
    }
    buckets {
      edges {
        node {
          id
          name
        }
      }
    }
    environments {
      edges {
        node {
          id
          name
          canAccess
          deletedAt
          unmergedChangesCount
          serviceInstances {
            edges {
              node {
                id
                serviceId
                serviceName
                environmentId
                numReplicas
                latestDeployment {
                  canRedeploy
                  id
                  meta
                  status
                  createdAt
                  deploymentStopped
                  instances {
                    id
                    status
                  }
                }
                activeDeployments {
                  id
                  status
                  createdAt
                  meta
                  deploymentStopped
                  instances {
                    id
                    status
                  }
                }
                source {
                  repo
                  image
                }
                domains {
                  serviceDomains {
                    id
                    domain
                    targetPort
                  }
                  customDomains {
                    id
                    domain
                    targetPort
                  }
                }
                cronSchedule
                nextCronRunAt
                startCommand
              }
            }
          }
          volumeInstances {
            edges {
              node {
                serviceId
                mountPath
                environmentId
                currentSizeMB
                sizeMB
                state
                volume {
                  name
                  id
                }
              }
            }
          }
        }
      }
    }
    services {
      edges {
        node {
          id
          name
        }
      }
    }
  }
}
