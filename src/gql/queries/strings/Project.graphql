query Project($id: String!) {
  project(id: $id) {
    id
    name
    workspaceId
    deletedAt
    workspace {
      name
    }
    buckets {
      edges {
        node {
          id
          name
        }
      }
    }
    environments {
      edges {
        node {
          id
          name
          canAccess
          deletedAt
          unmergedChangesCount
        }
      }
    }
    services {
      edges {
        node {
          id
          name
        }
      }
    }
  }
}
